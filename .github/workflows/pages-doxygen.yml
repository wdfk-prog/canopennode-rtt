name: Doxygen Pages

"on":
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Doxygen site
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout package
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install Doxygen and Graphviz
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -qq \
            -o Acquire::Retries=5 \
            -o Acquire::http::Timeout=30 \
            -o Acquire::https::Timeout=30
          timeout 20m sudo apt-get install -y --no-install-recommends \
            -o Acquire::Retries=5 \
            -o Acquire::http::Timeout=30 \
            -o Acquire::https::Timeout=30 \
            doxygen graphviz

      - name: Prepare Doxygen output directory
        run: mkdir -p _doxygen/html

      - name: Build Doxygen HTML
        run: |
          doxygen Doxyfile 2>&1 | tee doxygen-pages.log
          test "${PIPESTATUS[0]}" -eq 0
          touch _doxygen/html/.nojekyll

      - name: Upload Doxygen log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-pages-log
          path: doxygen-pages.log
          if-no-files-found: error

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _doxygen/html

  deploy:
    name: Deploy Doxygen site
    needs: build
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
